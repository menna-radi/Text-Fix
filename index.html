<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Fix</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-title.png">
</head>
<body>

<div class="container">

  <!-- ---------- Top Bar: Logo + Dark + Language ---------- -->
  <div class="top-bar">
    <img src="images/logo.png" alt="Site Logo" class="site-logo">
    <h1 class="site-title">Text Fix</h1>

    <div class="top-controls">
      <button id="themeToggle">🌙</button>

      <label class="site-lang-label">
        🌐
        <select id="siteLang">
          <option value="en">🇬🇧 English</option>
          <option value="ar">🇪🇬 العربية</option>
          <option value="fr">🇫🇷 Français</option>
          <option value="de">🇩🇪 Deutsch</option>
          <option value="es">🇪🇸 Español</option>
          <option value="it">🇮🇹 Italiano</option>
          <option value="ru">🇷🇺 Русский</option>
        </select>
      </label>
    </div>
  </div>

  <!-- ---------- Controls: From/To + Swap + Copy ---------- -->
  <div class="controls">
    <label id="fromLabel" for="fromLang">From:</label>
    <select id="fromLang">
      <option value="en">English</option>
      <option value="ar" selected disabled>Arabic</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="it">Italian</option>
      <option value="ru">Russian</option>
    </select>

    <label id="toLabel" for="toLang">To:</label>
    <select id="toLang">
      <option value="en">English</option>
      <option value="ar">Arabic</option>
      <option value="fr">French</option>
      <option value="de">German</option>
      <option value="es">Spanish</option>
      <option value="it">Italian</option>
      <option value="ru">Russian</option>
    </select>

    <button id="swapBtn">🔄</button>
    <button id="copyBtn">📋</button>
  </div>

  <!-- ---------- Input + Output + Video ---------- -->
  <div class="main-section">
    <div class="text-section">
      <input type="text" id="inputText" placeholder="Type here..." class="form-control">
      <div id="output"></div>
    </div>

    <div class="video-section">
      <video controls>
        <source src="images/video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>

</div>

<script src="Converter.js"></script>
<script src="main.js"></script>
</body>
</html>
