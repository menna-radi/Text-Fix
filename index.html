<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Text Fix</title>
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" sizes="32x32" href="images/logo-title.png">
</head>
<body>

<div class="container">

  <!-- ---------- Top Bar: Logo + Dark + Language ---------- -->
  <header class="top-bar">
    <div class="top-bar-left">
      <img src="images/logo.png" alt="Site Logo" class="site-logo">
      <h1 class="site-title">Text<span> Fix</span></h1>
    </div>

    <div class="top-controls">
      <button id="themeToggle">🌙</button>

      <label class="site-lang-label">
        🌐
        <select id="siteLang">
          <option value="en">EN English</option>
          <option value="ar">AR العربية</option>
          <option value="fr">FR Français</option>
          <option value="de">DE Deutsch</option>
          <option value="es">ES Español</option>
          <option value="it">IT Italiano</option>
          <option value="ru">RU Русский</option>
        </select>
      </label>
    </div>
  </header>

  <main class="main-grid">
    <!-- ---------- Converter Panel ---------- -->
    <div class="converter-panel">
      <!-- Controls: From/To + Swap + Copy -->
      <div class="controls">
        <label id="fromLabel" for="fromLang">From:</label>
        <select id="fromLang">
          <option value="en">EN English</option>
          <option value="ar" selected disabled>AR Arabic</option>
          <option value="fr">FR French</option>
          <option value="de">DE German</option>
          <option value="es">ES Spanish</option>
          <option value="it">IT Italian</option>
          <option value="ru">RU Russian</option>
        </select>

        <label id="toLabel" for="toLang">To:</label>
        <select id="toLang">
          <option value="en">EN English</option>
          <option value="ar">AR Arabic</option>
          <option value="fr">FR French</option>
          <option value="de">DE German</option>
          <option value="es">ES Spanish</option>
          <option value="it">IT Italian</option>
          <option value="ru">RU Russian</option>
        </select>

        <button id="swapBtn" class="btn-icon" title="Swap Languages">🔄</button>
        <button id="copyBtn" class="btn-icon" title="Copy Text">📋</button>
      </div>

      <!-- Input + Output -->
      <div class="text-areas">
        <textarea id="inputText" placeholder="Type here..." class="form-control" autocapitalize="off" autocorrect="off" autocomplete="off" spellcheck="false"></textarea>
        <div id="output"></div>
      </div>
    </div>

    <!-- ---------- Video Panel ---------- -->
    <div class="video-panel">
      <video controls>
        <source src="images/video.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>
    </div>
  </main>

</div>

<script src="converter.js"></script>
<script src="main.js"></script>
</body>
</html>
